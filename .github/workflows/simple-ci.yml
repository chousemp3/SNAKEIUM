name: 🐍 SNAKEIUM Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Quick Test - ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]  # Simplified: removed macOS for now
        python-version: ['3.10', '3.11', '3.12']  # Simplified: fewer versions

    steps:
    - name: 📂 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 🖥️ Setup Display (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq -y xvfb
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 2

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame

    - name: ✅ Syntax Check
      run: python -m py_compile snakeium.py

    - name: 🧪 Basic Test
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
        DISPLAY: :99
      run: |
        python -c "import pygame; pygame.init(); print('✅ Pygame OK')"
        python snakeium.py --test-mode --no-music

    - name: 🎉 Success
      run: echo "✅ All tests passed for ${{ matrix.os }} Python ${{ matrix.python-version }}!"

  # Simple build check
  build:
    name: 📦 Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: 📂 Checkout
      uses: actions/checkout@v4
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: 📋 Check Files
      run: |
        echo "📁 Repository contents:"
        ls -la
        echo "✅ Build check completed"

name: 🐍 SNAKEIUM Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Linux tests - comprehensive
  linux-test:
    name: 🐧 Linux Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: 📂 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 🖥️ Setup Virtual Display
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq -y xvfb
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 2

    - name: 📦 Install System Dependencies
      run: |
        sudo apt-get install -qq -y python3-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: 📦 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame>=2.1.0

    - name: ✅ Syntax Check
      run: python -m py_compile snakeium.py

    - name: 🧪 Full SNAKEIUM Test
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
        DISPLAY: :99
      run: |
        python snakeium.py --test-mode --no-music

    - name: 🎉 Linux Success
      run: echo "✅ Linux test passed for Python ${{ matrix.python-version }}"

  # Windows tests - basic compatibility only
  windows-test:
    name: 🪟 Windows Test - Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: 📂 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Install Pygame (Windows)
      run: |
        python -m pip install --upgrade pip
        pip install pygame>=2.1.0
      shell: cmd

    - name: ✅ Syntax Check
      run: python -m py_compile snakeium.py
      shell: cmd

    - name: 🧪 Windows Compatibility Test
      run: python windows_test.py
      shell: cmd

    - name: 🎉 Windows Success
      run: echo "✅ Windows compatibility verified for Python ${{ matrix.python-version }}"
      shell: cmd

  # Build check - only runs if Linux tests pass
  build-check:
    name: 📦 Build Check
    runs-on: ubuntu-latest
    needs: linux-test
    
    steps:
    - name: 📂 Checkout
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📋 Project Verification
      run: |
        echo "🎮 SNAKEIUM Project Verification"
        echo "================================"
        echo "📁 Files:"
        ls -la *.py *.md *.txt 2>/dev/null || true
        echo ""
        echo "📊 Code Stats:"
        if [ -f snakeium.py ]; then
          echo "  snakeium.py: $(wc -l < snakeium.py) lines"
        fi
        echo ""
        echo "✅ SNAKEIUM build verification completed!"

name: 🎮 SNAKEIUM Status

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Main test - Linux only (most reliable)
  test:
    name: ✅ Game Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Setup Environment
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq -y xvfb python3-dev libsdl2-dev
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 2

    - name: Install & Test
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
        DISPLAY: :99
      run: |
        python -m pip install --upgrade pip
        pip install pygame>=2.1.0
        python -m py_compile snakeium.py
        python snakeium.py --test-mode --no-music
        echo "✅ SNAKEIUM works on Python ${{ matrix.python-version }}"

  # Optional Windows syntax check (won't block pipeline)
  windows-check:
    name: 🪟 Windows Check
    runs-on: windows-latest
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Syntax Check
      run: python -m py_compile snakeium.py

name: 🐍 SNAKEIUM CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  test:
    name: 🧪 Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔍 Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 snakeium.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 snakeium.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 🎮 Test game import and basic functionality
      run: |
        python -c "import snakeium; print('✅ SNAKEIUM imported successfully')"
        python -c "import pygame; pygame.init(); print('✅ Pygame initialized')"

    - name: 🎵 Test without music (headless)
      run: |
        python snakeium.py --no-music --help || true

  build:
    name: 📦 Build distribution packages
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel

    - name: 🔨 Build package
      run: python -m build

    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-packages
        path: dist/

  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'release'

    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 📥 Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist-packages
        path: dist/

    - name: 🚀 Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        tag_name: ${{ github.ref_name }}
        name: 🐍 SNAKEIUM v${{ github.ref_name }}
        body: |
          ## 🎉 SNAKEIUM - GHOSTKITTY Edition v${{ github.ref_name }}
          
          ### 🎵 What's New:
          - Enhanced retro Snake game experience
          - 8-bit visuals with rainbow effects
          - GHOSTKITTY soundtrack integration
          - 5 speed settings from Chill to Nightmare
          - Power-ups and ultra-smooth gameplay
          
          ### 📥 Installation:
          ```bash
          pip install snakeium-ghostkitty
          ```
          
          ### 🎮 Quick Start:
          ```bash
          python snakeium.py
          ```
          
          See the [README](README.md) for full documentation.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
